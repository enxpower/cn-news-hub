# ============================================================================
# Fetch news from Notion-managed RSS sources, rebuild the static site, and
# deploy it to GitHub Pages.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   NOTION_API_KEY       - Notion internal integration token
#   NOTION_DATABASE_ID   - The "News Sources" database ID
#
# Domain configuration - NO code changes needed to switch domains:
#   1. GitHub: Settings -> Pages -> Custom domain  (e.g. newdomain.com)
#   2. GoDaddy: update DNS records as needed
#   This workflow reads public/CNAME at build time and derives SITE_URL
#   automatically. public/CNAME is maintained by GitHub Pages.
# ============================================================================

name: Fetch news and deploy

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch news from RSS sources (via Notion source list)
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: npm run fetch-news
        timeout-minutes: 5

      - name: Commit updated content and lockfile
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add -A -- src/content/articles data package-lock.json
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            # Stash any uncommitted changes in the working tree (e.g. changes
            # to package-lock.json from npm install that weren't staged) before
            # pulling, then restore them afterward. This prevents the
            # "cannot pull with rebase: Your index contains uncommitted changes"
            # error that occurs when concurrent workflow runs push to the same
            # branch and a pull is needed before we can push.
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
            git commit -m "chore: auto-update news content and lockfile [skip ci]"
            git push
          fi

      - name: Derive SITE_URL from public/CNAME
        id: site_url
        run: |
          CNAME=$(cat public/CNAME | tr -d '[:space:]')
          echo "SITE_URL=https://${CNAME}" >> $GITHUB_OUTPUT
          echo "Derived SITE_URL: https://${CNAME}"

      - name: Build site
        env:
          SITE_URL: ${{ steps.site_url.outputs.SITE_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: fetch-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
