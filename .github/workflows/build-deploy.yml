# ============================================================================
# Fetch news from Notion-managed RSS sources, rebuild the static site, and
# deploy it to GitHub Pages.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   NOTION_API_KEY       - Notion internal integration token (read + update
#                           access to the "News Sources" database)
#   NOTION_DATABASE_ID   - The "News Sources" database ID
#
# Required repository variable (Settings -> Secrets and variables -> Actions
#   -> Variables tab):
#   SITE_URL             - The canonical site URL, e.g. https://example.com
#                          This is the ONLY place the domain is configured.
#                          Changing it here + updating public/CNAME and the
#                          GitHub Pages custom domain setting is all that is
#                          needed to move the site to a new domain - no code
#                          changes required.
#
# Required one-time setup (Settings -> Pages):
#   Source: "GitHub Actions"
#
# Dependency reproducibility:
#   package-lock.json starts as a minimal placeholder. The first run here
#   regenerates it via `npm install` and the auto-commit step writes the
#   full, version-locked file back to the repo. From then on, npm's cache
#   (keyed on this file) and `npm ci` produce deterministic installs.
#
# Cost note: this is a public repository, so GitHub Actions minutes are
# unlimited/free regardless of run duration. timeout-minutes below exists
# purely so a future hang fails fast and frees the runner, not for billing.
#
# Commit step: plain `git add -A -- <paths>` + commit + push, run directly
# (not via a third-party action). A prior version used
# stefanzweifel/git-auto-commit-action, which committed deletions and
# modifications to already-tracked files but silently failed to stage
# newly-created article Markdown files - new articles never made it into the
# build. `git add -A` unambiguously stages new, modified, and deleted files.
# ============================================================================

name: Fetch news and deploy

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch news from RSS sources (via Notion source list)
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: npm run fetch-news
        timeout-minutes: 5

      - name: Commit updated content and lockfile
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add -A -- src/content/articles data package-lock.json
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "chore: auto-update news content and lockfile [skip ci]"
            git push
          fi

      - name: Build site
        env:
          # SITE_URL is set as a repository variable in GitHub:
          # Settings -> Secrets and variables -> Actions -> Variables
          # This is the single source of truth for the domain - no code
          # changes are needed when switching to a new domain.
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: fetch-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
